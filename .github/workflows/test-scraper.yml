name: Test scraper (manual, throwaway)

on:
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build scraper
        run: |
          cd scraper
          go build -o ../scraper-bin .

      - name: Run scraper
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          ALLOWED_SERVICES: aws
        run: |
          mkdir -p www
          ./scraper-bin

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: instances-json
          path: www/instances.json
